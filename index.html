<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta name="theme-color" content="#a67b5b" />
<link rel="manifest" href="manifest.json" />
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>每日记账 - Hello Kitty</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #fefaf0;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  display: flex; justify-content: center; align-items: flex-start;
  min-height: 100vh; padding: 12px;
}
.phone-frame {
  width: 390px; min-height: 820px;
  background: #fefaf0;
  border-radius: 40px;
  box-shadow: 0 20px 60px rgba(139,105,52,0.15), 0 0 0 1px rgba(164,116,66,0.15);
  overflow: hidden; position: relative;
}
/* 状态栏 */
.status-bar {
  background: linear-gradient(135deg, #d4a574 0%, #a67b5b 100%);
  padding: 8px 20px; text-align: center; color: #fff; font-size: 12px;
  letter-spacing: 1px;
}
/* 导航 */
.nav-bar {
  background: linear-gradient(135deg, #d4a574 0%, #a67b5b 100%);
  padding: 6px 16px 14px; text-align: center;
  position: relative;
}
.nav-bar .nav-title {
  font-size: 18px; font-weight: 700;
  color: #fff; letter-spacing: 1px;
}
.nav-bar .nav-title::after {
  content: "🎀"; font-size: 16px; margin-left: 6px;
}
/* Tab */
.tab-bar {
  display: flex; background: #fff; margin: 0 0;
  border-bottom: 1px solid #e8d5c0;
}
.tab-item {
  flex: 1; text-align: center; padding: 10px 0 8px;
  font-size: 14px; font-weight: 600; color: #999;
  cursor: pointer; position: relative; transition: all 0.2s;
  user-select: none;
}
.tab-item.active {
  color: #a67b5b;
}
.tab-item.active::after {
  content: ""; position: absolute; bottom: 0; left: 20%; right: 20%;
  height: 3px; background: #a67b5b; border-radius: 3px 3px 0 0;
}
.tab-item .tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }
/* Content */
.content { padding: 10px 14px 20px; }
/* Daily Card */
.header {
  display: flex; flex-direction: column; align-items: center;
  padding: 14px 0 10px;
}
.header h1 { font-size: 22px; font-weight: 700; color: #a67b5b; letter-spacing: 1px; }
.header h1::before { content: "🐻 "; }
.header .date { font-size: 12px; color: #a67b5b; margin-top: 2px; }
.card {
  background: #ffffff; border-radius: 18px; padding: 14px 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 12px rgba(139,105,52,0.08);
  border: 1px solid #e8d5c0;
}
.section-title {
  font-size: 14px; font-weight: 600; color: #a67b5b;
  padding-bottom: 10px; margin-bottom: 2px;
  border-bottom: 1.5px solid #e8d5c0;
}
.section-title::before { content: "🧸 "; }
.input-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0; border-bottom: 1px solid #f5ede4;
}
.input-row:last-child { border-bottom: none; }
.cat-total { display: flex; align-items: center; gap: 6px; }
.cat-sum { font-size: 16px; font-weight: 700; color: #8b6934; min-width: 54px; text-align: right; }
.bear-add {
  width: 48px; height: 48px; border-radius: 50%; border: none;
  background: linear-gradient(145deg, #c4793a, #a05a2c);
  color: #fff; font-size: 14px; font-weight: 700; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: all 0.15s; user-select: none;
  box-shadow: 0 4px 14px rgba(160,90,44,0.4), inset 0 -2px 6px rgba(0,0,0,0.12);
  line-height: 1; position: relative;
}
.bear-add .paw-icon { font-size: 20px; position: relative; }
.bear-add .paw-label { font-size: 8px; opacity: 0.9; margin-top: 0px; letter-spacing: 1px; }
.bear-add:active { transform: scale(0.88); background: linear-gradient(145deg, #a05a2c, #7a3e1a); }
.label-wrap { display: flex; align-items: center; gap: 6px; }
.label-icon { font-size: 20px; width: 28px; text-align: center; }
.label-text { font-size: 14px; color: #555; font-weight: 500; }
.input-wrap {
  display: flex; align-items: center;
  background: #fefaf0; border-radius: 8px; padding: 3px 10px;
}
.input-wrap input {
  font-size: 14px; color: #333; text-align: right;
  width: 80px; height: 30px; line-height: 30px;
  border: none; outline: none; background: transparent;
}
.input-wrap input::placeholder { color: #c4956a; font-size: 12px; }
.input-wrap .unit { font-size: 12px; color: #a67b5b; margin-left: 3px; }
/* Total Card */
.total-card {
  background: linear-gradient(135deg, #d4a574 0%, #8b6934 100%);
  border-radius: 16px; padding: 18px 20px; margin-bottom: 14px;
  box-shadow: 0 6px 20px rgba(139,105,52,0.25);
}
.total-row { display: flex; align-items: center; justify-content: space-between; }
.total-label { font-size: 15px; color: rgba(255,255,255,0.9); font-weight: 500; }
.total-amount { font-size: 30px; color: #fff; font-weight: 700; letter-spacing: 1px; }
.clear-btn {
  width: 100%; height: 42px; line-height: 42px;
  background: #ffffff; border-radius: 21px;
  font-size: 13px; color: #a67b5b;
  border: 1.5px solid #e8d5c0; text-align: center;
  cursor: pointer; transition: all 0.15s; user-select: none;
}
.clear-btn:active { background: #f5ede4; color: #a67b5b; transform: scale(0.98); }
/* Monthly / Yearly */
.month-header, .year-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; margin-bottom: 6px;
}
.month-nav, .year-nav {
  display: flex; align-items: center; gap: 10px;
}
.month-nav span, .year-nav span {
  font-size: 16px; font-weight: 600; color: #a67b5b;
}
.nav-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: #e8d5c0; border: none; cursor: pointer;
  font-size: 16px; color: #a67b5b;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; user-select: none;
}
.nav-btn:active { background: #d4a574; transform: scale(0.92); }
.summary-text {
  font-size: 12px; color: #a67b5b; text-align: center;
  margin-bottom: 6px;
}
/* Table */
.data-table {
  width: 100%; border-collapse: collapse; font-size: 12px;
}
.data-table th {
  background: #e8d5c0; color: #a67b5b; font-weight: 600;
  padding: 6px 4px; text-align: center;
}
.data-table td {
  padding: 6px 4px; text-align: center;
  border-bottom: 1px solid #f5ede4; color: #555;
}
.data-table tr:nth-child(even) td { background: #fef8f2; }
/* Chart */
.chart-wrap {
  background: #ffffff; border-radius: 18px; padding: 16px;
  margin-bottom: 12px; border: 1px solid #e8d5c0;
  box-shadow: 0 2px 12px rgba(139,105,52,0.08);
}
.chart-title {
  font-size: 13px; font-weight: 600; color: #a67b5b;
  margin-bottom: 8px; text-align: center;
}
.chart-title::before { content: "📈 "; }
canvas { width: 100%; height: 180px; display: block; }
/* HK Decorations */
.hk-bow {
  position: absolute; top: -4px; right: 20px;
  font-size: 28px; opacity: 0.5; transform: rotate(15deg);
}
.hk-footer {
  text-align: center; padding: 14px 0 8px;
  font-size: 11px; color: #c4956a;
}
.hk-footer span { font-size: 14px; }
/* Tab content visibility */
.tab-content { display: none; }
.tab-content.active { display: block; }
/* Modal */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.35); z-index: 100;
  justify-content: center; align-items: center;
}
.modal-overlay.show { display: flex; }
.modal-card {
  background: #fff; border-radius: 20px; padding: 24px 28px 20px;
  width: 280px; box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  text-align: center;
}
.modal-icon { font-size: 36px; display: block; margin-bottom: 6px; }
.modal-name { font-size: 18px; font-weight: 600; color: #8b6934; margin-bottom: 16px; }
.modal-input {
  width: 100%; height: 44px; border: 2px solid #e8d5c0; border-radius: 12px;
  text-align: center; font-size: 24px; outline: none; color: #333;
  background: #fef8f2; margin-bottom: 16px; box-sizing: border-box;
}
.modal-input:focus { border-color: #a67b5b; }
.modal-input::placeholder { color: #c4956a; font-size: 16px; }
.modal-btns { display: flex; gap: 10px; }
.modal-btn {
  flex: 1; height: 42px; border-radius: 21px; border: none;
  font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.12s;
}
.modal-btn-cancel { background: #f5ede4; color: #a67b5b; }
.modal-btn-cancel:active { background: #e8d5c0; }
.modal-btn-confirm { background: #d4a574; color: #fff; }
.modal-btn-confirm:active { background: #8b6934; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="nav-bar">
    <div class="nav-title">🐻 每日记账</div>
    <div class="hk-bow">🧸</div>

</div>

  <!-- Tab -->
  <div class="tab-bar">
    <div class="tab-item active" data-tab="daily">
      <span class="tab-icon">📋</span>今日
  
</div>
    <div class="tab-item" data-tab="monthly">
      <span class="tab-icon">📅</span>月度
  
</div>
    <div class="tab-item" data-tab="yearly">
      <span class="tab-icon">📊</span>年度
  
</div>

</div>

  <div class="content">

    <!-- ========== TAB1: 今日账单 ========== -->
    <div class="tab-content active" id="tabDaily">
      <div class="header">
        <div class="date" id="dateDisplay"></div>
    
</div>
      <div class="card" id="categoriesCard">
        <div class="section-title">支出明细</div>
        <div id="categoryList"></div>
    
</div>
      <div class="total-card">
        <div class="total-row">
          <span class="total-label">🧸 今日总花费</span>
          <span class="total-amount" id="totalDisplay">¥ 0.00</span>
      
</div>
    
</div>
      <div class="clear-btn" id="clearBtn">🧸 清空所有金额</div>
      <div class="hk-footer"><span>🧸</span> 每次修改自动保存到本地 <span>🧸</span></div>
    <!-- Modal -->
    <div class="modal-overlay" id="expenseModal">
      <div class="modal-card">
        <span class="modal-icon" id="modalIcon">🍱</span>
        <div class="modal-name" id="modalName">午餐</div>
        <input class="modal-input" type="text" inputmode="decimal" id="modalAmount" placeholder="输入金额" autofocus />
        <div class="modal-btns">
          <button class="modal-btn modal-btn-cancel" id="modalCancel">取消</button>
          <button class="modal-btn modal-btn-confirm" id="modalConfirm">完成</button>
        </div>
      </div>
    </div>
  
</div>

    <!-- ========== TAB2: 月度账单 ========== -->
    <div class="tab-content" id="tabMonthly">
      <div class="header">
        <div class="date" id="monthTitle"></div>
    
</div>
      <div class="month-header">
        <div class="month-nav">
          <button class="nav-btn" id="monthPrev">‹</button>
          <span id="monthLabel"></span>
          <button class="nav-btn" id="monthNext">›</button>
      
</div>
        <div class="summary-text" id="monthSummary"></div>
    
</div>
      <div class="card" style="padding:10px 14px;">
        <div class="section-title">每日支出明细</div>
        <div style="max-height:220px;overflow-y:auto;" id="monthlyTableWrap">
          <table class="data-table" id="monthlyTable">
            <thead><tr><th>日期</th><th>总花费</th></tr></thead>
            <tbody id="monthlyBody"></tbody>
          </table>
      
</div>
    
</div>

      <div class="total-card">
        <div class="total-row">
          <span class="total-label">🧸 月度总支出</span>
          <span class="total-amount" id="monthTotalDisplay">¥ 0.00</span>
      
</div>
    
</div>
  
</div>

    <!-- ========== TAB3: 年度账单 ========== -->
    <div class="tab-content" id="tabYearly">
      <div class="header">
        <div class="date" id="yearTitle"></div>
    
</div>
      <div class="year-header">
        <div class="year-nav">
          <button class="nav-btn" id="yearPrev">‹</button>
          <span id="yearLabel"></span>
          <button class="nav-btn" id="yearNext">›</button>
      
</div>
        <div class="summary-text" id="yearSummary"></div>
    
</div>
      <div class="card" style="padding:10px 14px;">
        <div class="section-title">每月支出汇总</div>
        <div style="max-height:222px;overflow-y:auto;">
          <table class="data-table" id="yearlyTable">
            <thead><tr><th>月份</th><th>总花费</th></tr></thead>
            <tbody id="yearlyBody"></tbody>
          </table>
      
</div>
    
</div>
      <div class="chart-wrap">
        <div class="chart-title">每月支出折线图</div>
        <canvas id="yearChart" height="180"></canvas>
    
</div>
      <div class="total-card">
        <div class="total-row">
          <span class="total-label">🧸 年度总支出</span>
          <span class="total-amount" id="yearTotalDisplay">¥ 0.00</span>
      
</div>
    
</div>
  
</div>


</div>
</div>

<script>
const CATEGORIES = [
  { key:"breakfast", name:"早餐", icon:"🌅" },
  { key:"lunch",     name:"午餐", icon:"🍱" },
  { key:"dinner",    name:"晚餐", icon:"🍜" },
  { key:"snacks",    name:"零食", icon:"🍪" },
  { key:"drinks",    name:"饮料", icon:"🥤" },
  { key:"commute",   name:"通勤", icon:"🚌" },
  { key:"other",     name:"其他", icon:"📦" }
];
const STORAGE_KEY = "daily_expense_hk";
const HK_BROWN = "#a67b5b";
const HK_LIGHT = "#d4a574";
const HK_MID = "#c4956a";

/* ========== UTILITY ========== */
function pad2(n) { return String(n).padStart(2,"0"); }
function todayObj() { const d=new Date(); return { y:d.getFullYear(), m:d.getMonth()+1, d:d.getDate() }; }
function dateStr(o) { return o.y+"年"+pad2(o.m)+"月"+pad2(o.d)+"日"; }
function daysInMonth(y,m) { return new Date(y,m,0).getDate(); }
function monthStr(y,m) { return y+"年"+pad2(m)+"月"; }

function loadDayData(o) {
  try {
    const raw = localStorage.getItem(STORAGE_KEY+"_"+dateStr(o));
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}
function saveDayData(o, data) {
  localStorage.setItem(STORAGE_KEY+"_"+dateStr(o), JSON.stringify(data));
}
function getAllDates() {
  const keys=[];
  for(let i=0; i<localStorage.length; i++) {
    const k=localStorage.key(i);
    if(k && k.startsWith(STORAGE_KEY+"_")) keys.push(k);
  }
  return keys;
}
function parseDateFromKey(k) {
  const s=k.replace(STORAGE_KEY+"_","");
  const m=s.match(/(\d+)年(\d+)月(\d+)日/);
  if(!m) return null;
  return { y:+m[1], m:+m[2], d:+m[3] };
}
function calcDayTotal(data) {
  let sum=0;
  CATEGORIES.forEach(c=>{
    const raw=data[c.key];
    if(Array.isArray(raw)) {
      raw.forEach(v=>{ const n=parseFloat(v); if(!isNaN(n)) sum+=n; });
    } else {
      const n=parseFloat(raw); if(!isNaN(n)) sum+=n;
    }
  });
  return sum;
}

/* ========== TAB SWITCH ========== */
document.querySelectorAll(".tab-item").forEach(el=>{
  el.addEventListener("click", function(){
    document.querySelectorAll(".tab-item").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
    this.classList.add("active");
    document.getElementById("tab"+this.dataset.tab.charAt(0).toUpperCase()+this.dataset.tab.slice(1)).classList.add("active");
    if(this.dataset.tab==="monthly") renderMonthly();
    if(this.dataset.tab==="yearly") renderYearly();
  });
});

/* ========== TAB1: DAILY ========== */
function renderDaily() {
  const o=todayObj();
  document.getElementById("dateDisplay").textContent=dateStr(o);
  const data=loadDayData(o);
  const listEl=document.getElementById("categoryList");
  listEl.innerHTML="";
  const modal=document.getElementById("expenseModal");
  const modalIcon=document.getElementById("modalIcon");
  const modalName=document.getElementById("modalName");
  const modalAmt=document.getElementById("modalAmount");
  let activeKey=null;
  CATEGORIES.forEach(cat=>{
    const row=document.createElement("div"); row.className="input-row";
    const raw=data[cat.key];
    let arr=[];
    if(Array.isArray(raw)) arr=raw.slice();
    else if(raw&&raw!=="") arr=[raw];
    if(arr.length===0) arr=[];
    const catSum=arr.reduce((s,v)=>{ const n=parseFloat(v); return s+(isNaN(n)?0:n); },0);
    row.innerHTML=`
      <div class="label-wrap"><span class="label-icon">${cat.icon}</span><span class="label-text">${cat.name}</span></div>
      <div class="cat-total">
        <span class="cat-sum">¥ ${catSum.toFixed(2)}</span>
        <button class="bear-add" data-key="${cat.key}">
          <span class="paw-icon">🐾</span>
          <span class="paw-label">ADD</span>
        </button>
      </div>`;
    row.querySelector(".bear-add").addEventListener("click",function(){
      activeKey=this.dataset.key;
      const c=CATEGORIES.find(x=>x.key===activeKey);
      modalIcon.textContent=c.icon;
      modalName.textContent=c.name;
      modalAmt.value="";
      modal.classList.add("show");
      setTimeout(()=>modalAmt.focus(),100);
    });
    listEl.appendChild(row);
  });
  const updateDailyTotal=()=>{
    const d=loadDayData(o); document.getElementById("totalDisplay").textContent="¥ "+calcDayTotal(d).toFixed(2);
  };
  updateDailyTotal();
  // Modal events
  const doConfirm=()=>{
    const v=modalAmt.value.trim(); const num=parseFloat(v);
    if(isNaN(num)||num<=0){ modalAmt.value=""; modalAmt.focus(); return; }
    const d=loadDayData(o);
    const raw=d[activeKey];
    let arr=[];
    if(Array.isArray(raw)) arr=raw.slice();
    else if(raw&&raw!=="") arr=[raw];
    arr.push(num.toFixed(2));
    d[activeKey]=arr;
    saveDayData(o,d);
    modal.classList.remove("show");
    renderDaily();
  };
  document.getElementById("modalConfirm").onclick=doConfirm;
  document.getElementById("modalCancel").onclick=()=>{ modal.classList.remove("show"); };
  modal.onclick=(e)=>{ if(e.target===modal) modal.classList.remove("show"); };
  modalAmt.onkeydown=(e)=>{ if(e.key==="Enter") doConfirm(); };
}
document.getElementById("clearBtn").addEventListener("click",()=>{
  if(!confirm("🧸 确定要清空所有金额吗？")) return;
  const empty={}; CATEGORIES.forEach(c=>{ empty[c.key]=[""]; });
  saveDayData(todayObj(), empty);
  renderDaily();
});

/* ========== TAB2: MONTHLY ========== */
let currentMonth=null;
function getMonthData(y,m) {
  const days=daysInMonth(y,m);
  const result=[];
  let total=0;
  for(let d=1; d<=days; d++) {
    const o={y,m,d};
    const data=loadDayData(o);
    const dayTotal=calcDayTotal(data);
    result.push({ date:d, total:dayTotal });
    total+=dayTotal;
  }
  return { days:result, total };
}
function renderMonthly() {
  if(!currentMonth) { const t=todayObj(); currentMonth={ y:t.y, m:t.m }; }
  const {y,m}=currentMonth;
  document.getElementById("monthLabel").textContent=monthStr(y,m);
  document.getElementById("monthTitle").textContent=monthStr(y,m)+"账单";
  const md=getMonthData(y,m);
  document.getElementById("monthTotalDisplay").textContent="¥ "+md.total.toFixed(2);
  document.getElementById("monthSummary").textContent="共 "+md.days.length+" 天 · 有支出 "+(md.days.filter(d=>d.total>0).length)+" 天";
  // Table
  const tbody=document.getElementById("monthlyBody"); tbody.innerHTML="";
  md.days.forEach(d=>{
    const tr=document.createElement("tr");
    tr.innerHTML="<td>"+pad2(d.date)+"日</td><td>"+(d.total>0?"¥ "+d.total.toFixed(2):"-")+"</td>";
    tbody.appendChild(tr);
  });
  // Chart
  drawLineChart("monthChart", md.days.map(d=>pad2(d.date)+"日"), md.days.map(d=>d.total), "每日支出 (元)");
}
document.getElementById("monthPrev").addEventListener("click",()=>{
  if(!currentMonth) { const t=todayObj(); currentMonth={ y:t.y, m:t.m }; }
  currentMonth.m--; if(currentMonth.m<1) { currentMonth.m=12; currentMonth.y--; }
  renderMonthly();
});
document.getElementById("monthNext").addEventListener("click",()=>{
  if(!currentMonth) { const t=todayObj(); currentMonth={ y:t.y, m:t.m }; }
  currentMonth.m++; if(currentMonth.m>12) { currentMonth.m=1; currentMonth.y++; }
  renderMonthly();
});

/* ========== TAB3: YEARLY ========== */
let currentYear=null;
function getYearData(y) {
  const result=[];
  let total=0;
  for(let m=1; m<=12; m++) {
    const md=getMonthData(y,m);
    result.push({ month:m, total:md.total });
    total+=md.total;
  }
  return { months:result, total };
}
function renderYearly() {
  if(!currentYear) currentYear=todayObj().y;
  const y=currentYear;
  document.getElementById("yearLabel").textContent=y+"年";
  document.getElementById("yearTitle").textContent=y+"年账单";
  const yd=getYearData(y);
  document.getElementById("yearTotalDisplay").textContent="¥ "+yd.total.toFixed(2);
  document.getElementById("yearSummary").textContent="年度共支出 "+yd.total.toFixed(2)+" 元";
  const tbody=document.getElementById("yearlyBody"); tbody.innerHTML="";
  yd.months.forEach(m=>{
    const tr=document.createElement("tr");
    tr.innerHTML="<td>"+m.month+"月</td><td>"+(m.total>0?"¥ "+m.total.toFixed(2):"-")+"</td>";
    tbody.appendChild(tr);
  });
  drawLineChart("yearChart", yd.months.map(m=>m.month+"月"), yd.months.map(m=>m.total), "每月支出 (元)");
}
document.getElementById("yearPrev").addEventListener("click",()=>{
  if(!currentYear) currentYear=todayObj().y;
  currentYear--; renderYearly();
});
document.getElementById("yearNext").addEventListener("click",()=>{
  if(!currentYear) currentYear=todayObj().y;
  currentYear++; renderYearly();
});

/* ========== LINE CHART (Canvas) ========== */
function drawLineChart(canvasId, labels, values, yLabel) {
  const canvas=document.getElementById(canvasId);
  const rect=canvas.parentElement.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  const w=Math.max(rect.width-32, 300);
  const h=180;
  canvas.width=w*dpr; canvas.height=h*dpr;
  canvas.style.width=w+"px"; canvas.style.height=h+"px";
  const ctx=canvas.getContext("2d");
  ctx.scale(dpr,dpr);
  // Clear
  ctx.clearRect(0,0,w,h);
  const pad={ top:20, bottom:28, left:40, right:16 };
  const chartW=w-pad.left-pad.right;
  const chartH=h-pad.top-pad.bottom;
  const maxVal=Math.max(...values, 1);
  const stepCount=4;
  // Grid
  ctx.strokeStyle="#e8d5c0"; ctx.lineWidth=0.5;
  for(let i=0; i<=stepCount; i++) {
    const y=pad.top+chartH*(1-i/stepCount);
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(w-pad.right,y); ctx.stroke();
    ctx.fillStyle="#a67b5b"; ctx.font="9px sans-serif"; ctx.textAlign="right";
    ctx.fillText((maxVal*i/stepCount).toFixed(0), pad.left-4, y+3);
  }
  // X labels
  ctx.fillStyle="#a67b5b"; ctx.font="9px sans-serif"; ctx.textAlign="center";
  labels.forEach((l,i)=>{
    const x=pad.left+chartW*i/(labels.length-1||1);
    ctx.fillText(l, x, h-pad.bottom+14);
  });
  // Data points & line
  const pts=values.map((v,i)=>({
    x: pad.left+chartW*i/(labels.length-1||1),
    y: pad.top+chartH*(1-(maxVal>0?v/maxVal:0))
  }));
  // Fill area
  ctx.beginPath();
  pts.forEach((p,i)=>{ if(i===0) ctx.moveTo(p.x,pad.top+chartH); ctx.lineTo(p.x,p.y); });
  pts.slice().reverse().forEach(p=>ctx.lineTo(p.x,pad.top+chartH));
  ctx.closePath();
  const grad=ctx.createLinearGradient(0,pad.top,0,pad.top+chartH);
  grad.addColorStop(0,"rgba(139,105,52,0.25)");
  grad.addColorStop(1,"rgba(139,105,52,0.02)");
  ctx.fillStyle=grad; ctx.fill();
  // Line
  ctx.beginPath();
  pts.forEach((p,i)=>{ if(i===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y); });
  ctx.strokeStyle=HK_BROWN; ctx.lineWidth=2; ctx.lineJoin="round"; ctx.stroke();
  // Dots
  pts.forEach(p=>{
    ctx.beginPath(); ctx.arc(p.x,p.y,3.5,0,Math.PI*2);
    ctx.fillStyle="#fff"; ctx.fill();
    ctx.strokeStyle=HK_BROWN; ctx.lineWidth=1.5; ctx.stroke();
  });
}
